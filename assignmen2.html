<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Assignment 2</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <header>
        <h1>DOM Assignment 2</h1>
        <p>Follow the instructions in <code>INSTRUCTIONS.md</code> to complete the tasks below.</p>
    </header>


    <main>
        <!-- Task 1: Event Listeners & Class Manipulation -->
        <section class="task-section">
            <h2>Task 1: Theme Toggle & Hover Effect</h2>
            <button id="theme-btn">Toggle Dark Mode</button>
           
            <div id="hover-box" class="box">
                Hover over me!
            </div>
        </section>


        <!-- Task 2: Modifying Attributes -->
        <section class="task-section">
            <h2>Task 2: Attributes</h2>
            <div>
                <img id="profile-pic" src="https://via.placeholder.com/150/FF0000/FFFFFF?Text=Original" alt="Original Profile Image">
            </div>
            <button id="swap-btn">Swap Image</button>
            <br><br>
            <button id="disable-btn">Click to Disable Me</button>
        </section>


        <!-- Task 3: Creating and Appending Elements -->
        <section class="task-section">
            <h2>Task 3: Dynamic Elements</h2>
            <ul id="item-list">
                <li>Existing item 1</li>
                <li>Existing item 2</li>
            </ul>
            <button id="add-item-btn">Add New Item</button>
        </section>
    </main>


    <script src="script2.js"></script>
</body>
</html>
